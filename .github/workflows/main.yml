name: PHP Composer Build and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Build application
      run: php awk-helper app:build awk-helper

    - name: Create Latest Release
      if: github.ref == 'refs/heads/main'
      run: |
        # Сначала удаляем старый релиз latest, если он существует
        gh release delete latest -y --cleanup-tag 2>/dev/null || true

        # Создаем новый релиз latest
        gh release create latest \
          --title "Latest Build ($(date +'%Y-%m-%d %H:%M'))" \
          --notes "Автоматическая сборка из main branch" \
          --latest \
          builds/awk-helper
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
